<div class="login-page">
  <section class="login-hero">
    <div class="hero-badge">Recuperação</div>
    <h1>Recupere o acesso à sua conta em poucos passos.</h1>
    <p>Informe o email e defina uma nova senha para voltar a usar o sistema.</p>
  </section>

  <section class="login-card card">
    <h2>Recuperar senha</h2>
    <p>Atualize a senha da conta com segurança.</p>

    @if (erro) {
      <div class="alert-error">{{ erro }}</div>
    }

    @if (sucesso) {
      <div class="alert-success">{{ sucesso }}</div>
    }

    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" [(ngModel)]="email">
    </div>

    <div class="form-group">
      <label for="novaSenha">Nova senha</label>
      <input id="novaSenha" type="password" [(ngModel)]="novaSenha">
    </div>

    <button class="btn-primary login-button" [disabled]="loading" (click)="recuperar()">
      {{ loading ? 'A atualizar...' : 'Atualizar senha' }}
    </button>

    <p class="auth-links"><a routerLink="/login">Voltar ao login</a></p>
  </section>
</div>
