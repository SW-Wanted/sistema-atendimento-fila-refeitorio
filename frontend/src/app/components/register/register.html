<div class="login-page">
  <section class="login-hero">
    <div class="hero-badge">Novo utilizador</div>
    <h1>Crie a sua conta para aceder ao sistema do refeitório.</h1>
    <p>O registo é obrigatório para pedidos, histórico e acompanhamento em tempo real.</p>
  </section>

  <section class="login-card card">
    <h2>Registo</h2>
    <p>Preencha os dados abaixo para criar a conta.</p>

    @if (erro) {
      <div class="alert-error">{{ erro }}</div>
    }

    @if (sucesso) {
      <div class="alert-success">{{ sucesso }}</div>
    }

    <div class="form-group">
      <label for="nome">Nome</label>
      <input id="nome" type="text" [(ngModel)]="nome">
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" [(ngModel)]="email">
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" type="password" [(ngModel)]="senha">
    </div>

    <div class="form-group">
      <label for="tipo_conta">Tipo de conta</label>
      <select id="tipo_conta" [(ngModel)]="tipo_conta" name="tipo_conta">
        <option value="institucional">Institucional</option>
        <option value="guest">Guest</option>
      </select>
    </div>

    <button class="btn-primary login-button" [disabled]="loading" (click)="criarConta()">
      {{ loading ? 'A criar...' : 'Criar conta' }}
    </button>

    <p class="auth-links"><a routerLink="/login">Já tem conta? Entrar</a></p>
  </section>
</div>
