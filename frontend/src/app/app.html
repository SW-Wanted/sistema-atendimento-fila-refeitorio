<div class="shell" [class.shell--hidden]="!showShell">
	@if (showShell) {
		<header class="topbar">
			<div class="brand-block">
				<span class="brand-kicker">ISPTEC</span>
				<div>
					<h1>{{ title() }}</h1>
					<p>Pedidos digitais, cozinha em tempo real e gestão operacional.</p>
				</div>
			</div>

			<nav class="nav-links">
				@for (link of visibleLinks; track link.path) {
					<a [routerLink]="link.path" routerLinkActive="active-link">{{ t(link.label) }}</a>
				}
			</nav>

			<div class="toolbar-controls">
				<select [value]="currentLang" (change)="setLang($any($event.target).value)" aria-label="Idioma">
					<option value="pt">PT</option>
					<option value="en">EN</option>
				</select>
				<button class="btn btn-outline btn-small" type="button" (click)="toggleTheme()">
					{{ currentTheme === 'dark' ? 'Light' : 'Dark' }}
				</button>
			</div>

			<div class="user-chip">
				<div>
					<strong>{{ user?.nome }}</strong>
					<span>{{ user?.tipo_conta }}</span>
				</div>
				<button class="btn btn-outline btn-small" type="button" (click)="logout()">{{ t('logout') }}</button>
			</div>
		</header>
	}

	<main class="shell-content">
		<router-outlet></router-outlet>
	</main>
</div>
